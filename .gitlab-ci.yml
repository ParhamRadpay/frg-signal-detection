image: python:3.12

variables:
  SPHINXBUILD: sphinx-build
  DOCSDIR: docs
  SOURCEDIR: source
  BUILDDIR: public
  BUILDFORMAT: html
  REPORT: report.xml
  COVERAGE: coverage.xml
  UVSYNC: uv sync
  UVRUN: uv run

stages:
  - test
  - deploy

cache:
  paths:
    - .cache/pip
  key: "${CI_JOB_IMAGE}-${CI_COMMIT_REF_SLUG}"
  policy: pull

.python_base:
  before_script:
    - python -m ensurepip --upgrade
    - python -m pip install --upgrade pip setuptools wheel
    - python -m pip install uv
    - ${UVSYNC} --python=python
  tags:
    - is247653
  cache:
    paths:
      - .cache/pip
    key: "${CI_JOB_IMAGE}-${CI_COMMIT_REF_SLUG}"
    policy: pull

coverage:
  extends: .python_base
  stage: test
  cache:
    paths:
      - .cache/pip
    key: "${CI_JOB_IMAGE}-${CI_COMMIT_REF_SLUG}"
    policy: pull-push
  script:
    - ${UVSYNC} --group test
    - ${UVRUN} pytest --junitxml=${REPORT} --cov-report term --cov-report xml:${COVERAGE} --cov=src/ptdismap tests
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      junit: ${REPORT}
      coverage_report:
        coverage_format: cobertura
        path: ${COVERAGE}

pages:
  extends: .python_base
  stage: deploy
  script:
    - ${UVSYNC} --group docs
    - ${UVRUN} ${SPHINXBUILD} -b ${BUILDFORMAT} ${DOCSDIR}/${SOURCEDIR} ${BUILDDIR}
  artifacts:
    paths:
      - ${BUILDDIR}
  only:
    - main
